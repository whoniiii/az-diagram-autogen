<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="azBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4" />
      <stop offset="100%" style="stop-color:#00BCF2" />
    </linearGradient>
    <linearGradient id="azAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50E6FF" />
      <stop offset="100%" style="stop-color:#FFFFFF" />
    </linearGradient>
  </defs>
  <!-- Azure-style rounded square -->
  <rect width="120" height="120" rx="20" fill="url(#azBg)"/>
  <!-- Architecture nodes -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top-left node -->
    <rect x="16" y="20" width="30" height="24" rx="5" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
    <image href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0OCA0OCI+PGNpcmNsZSBjeD0iMjQiIGN5PSIyNCIgcj0iMTIiIGZpbGw9IndoaXRlIiBvcGFjaXR5PSIwLjgiLz48L3N2Zz4=" x="22" y="24" width="18" height="16"/>
    <!-- Top-right node -->
    <rect x="74" y="20" width="30" height="24" rx="5" fill="white" fill-opacity="0.2" stroke="white" stroke-width="1.5"/>
    <!-- Bottom-center node -->
    <rect x="38" y="66" width="30" height="24" rx="5" fill="white" fill-opacity="0.25" stroke="url(#azAccent)" stroke-width="2"/>
    <!-- Connection lines -->
    <line x1="46" y1="32" x2="74" y2="32" stroke="url(#azAccent)" stroke-width="2"/>
    <line x1="31" y1="44" x2="53" y2="66" stroke="url(#azAccent)" stroke-width="2"/>
    <line x1="89" y1="44" x2="68" y2="66" stroke="url(#azAccent)" stroke-width="2"/>
    <!-- Node dots -->
    <circle cx="31" cy="32" r="4" fill="white"/>
    <circle cx="89" cy="32" r="4" fill="#50E6FF"/>
    <circle cx="53" cy="78" r="4" fill="white"/>
  </g>
  <!-- Azure diamond accent -->
  <polygon points="53,96 60,102 53,108 46,102" fill="#50E6FF" opacity="0.8"/>
</svg>
